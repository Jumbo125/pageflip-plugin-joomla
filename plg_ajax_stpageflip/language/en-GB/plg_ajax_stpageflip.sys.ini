PLG_AJAX_STPAGEFLIP="AJAX - ST PageFlip"
PLG_AJAX_STPAGEFLIP_XML_DESCRIPTION="<strong>ST PageFlip – AJAX Plugin</strong><br><br>Part of the <strong>ST PageFlip</strong> package (together with <em>Content – ST PageFlip</em> and <em>Button – ST PageFlip</em>).<br><br>This plugin provides the secure backend AJAX endpoint used by the Content plugin's settings page. It handles two actions:<ul><li><strong>Scan:</strong> Lists all book folders under <code>images/stpageflip/</code> with their status (images present, conversion required, multiple PDFs, etc.).</li><li><strong>Convert:</strong> Converts a single book's PDF to WebP page images using PHP's Imagick extension.</li></ul><strong>Requirements for PDF conversion:</strong> PHP extension <code>imagick</code> with Ghostscript/PDF delegate support must be installed on the server.<br><br>This plugin must remain <strong>enabled</strong> for the conversion buttons in the Content plugin settings to work."
