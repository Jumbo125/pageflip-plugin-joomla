PLG_AJAX_STPAGEFLIP="AJAX - ST PageFlip"
PLG_AJAX_STPAGEFLIP_XML_DESCRIPTION="<strong>ST PageFlip – AJAX-Plugin</strong><br><br>Teil des <strong>ST PageFlip</strong>-Pakets (zusammen mit <em>Content – ST PageFlip</em> und <em>Button – ST PageFlip</em>).<br><br>Dieses Plugin stellt den gesicherten Backend-AJAX-Endpunkt bereit, der von der Einstellungsseite des Content-Plugins verwendet wird. Es unterstützt zwei Aktionen:<ul><li><strong>Scan:</strong> Listet alle Buchordner unter <code>images/stpageflip/</code> mit ihrem Status auf (Bilder vorhanden, Konvertierung erforderlich, mehrere PDFs usw.).</li><li><strong>Convert:</strong> Konvertiert die PDF eines einzelnen Buches mit der PHP-Erweiterung Imagick in WebP-Seitenbilder.</li></ul><strong>Voraussetzungen für die PDF-Konvertierung:</strong> Die PHP-Erweiterung <code>imagick</code> mit Ghostscript-/PDF-Delegate-Unterstützung muss auf dem Server installiert sein.<br><br>Dieses Plugin muss <strong>aktiviert</strong> bleiben, damit die Konvertierungs-Buttons in den Content-Plugin-Einstellungen funktionieren."
