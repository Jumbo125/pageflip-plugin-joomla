PLG_EDITORSXTD_STPAGEFLIP="Button - ST PageFlip"
PLG_EDITORSXTD_STPAGEFLIP_XML_DESCRIPTION="<strong>ST PageFlip – Editor-Button</strong><br><br>Teil des <strong>ST PageFlip</strong>-Pakets (zusammen mit <em>Content – ST PageFlip</em> und <em>AJAX – ST PageFlip</em>).<br><br>Fügt in der Werkzeugleiste des Joomla-Artikel-Editors einen Button <strong>&ldquo;PageFlip-Buch&rdquo;</strong> hinzu. Ein Klick darauf öffnet einen modalen Dialog, der:<ul><li>Alle verfügbaren Buchordner aus <code>images/stpageflip/</code> auflistet</li><li>PDF-Datei, Anzahl der Seitenbilder und Status jedes Buches anzeigt</li><li>Einen vollständigen <code>[book ...]</code>-Platzhalter mit allen Parametern an der Cursorposition einfügt</li></ul>Ein Buch ist einfügbar, wenn mindestens ein Seitenbild vorhanden ist. Bücher ohne PDF werden automatisch mit <code>download=&quot;false&quot;</code> eingefügt.<br><br><strong>Hinweis:</strong> Das Plugin <em>AJAX – ST PageFlip</em> muss ebenfalls aktiviert sein, damit die Buchliste geladen werden kann."
