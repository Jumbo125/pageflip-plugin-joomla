PLG_EDITORSXTD_STPAGEFLIP="Button - ST PageFlip"
PLG_EDITORSXTD_STPAGEFLIP_XML_DESCRIPTION="<strong>ST PageFlip – Editor Button</strong><br><br>Part of the <strong>ST PageFlip</strong> package (together with <em>Content – ST PageFlip</em> and <em>AJAX – ST PageFlip</em>).<br><br>Adds a <strong>&ldquo;PageFlip Book&rdquo;</strong> button to the Joomla article editor toolbar. Clicking the button opens a modal dialog that:<ul><li>Lists all available book folders from <code>images/stpageflip/</code></li><li>Shows each book's PDF file, number of page images and status</li><li>Inserts a complete <code>[book ...]</code> shortcode with all parameters at the cursor position</li></ul>A book is insertable when at least one page image exists. Books without a PDF are inserted with <code>download=&quot;false&quot;</code> automatically.<br><br><strong>Note:</strong> The <em>AJAX – ST PageFlip</em> plugin must also be enabled for the book list to load."
