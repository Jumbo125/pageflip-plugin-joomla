PLG_CONTENT_STPAGEFLIP="Content - ST PageFlip"
PLG_CONTENT_STPAGEFLIP_XML_DESCRIPTION="<strong>ST PageFlip</strong> – Interaktive blätterbare Flipbooks für Joomla-Artikel.<br><br><strong>Dieses Paket enthält drei Plugins:</strong><ul><li><strong>Content – ST PageFlip</strong> (dieses Plugin): Wandelt <code>[book img=&quot;ordner-name&quot;]</code>-Platzhalter in Artikeln in interaktive Flipbooks um.</li><li><strong>AJAX – ST PageFlip</strong>: Backend-Dienst zum Scannen von Buchordnern und zur Konvertierung von PDFs in Seitenbilder (Imagick erforderlich).</li><li><strong>Button – ST PageFlip</strong>: Fügt im Artikel-Editor einen Button &ldquo;PageFlip-Buch&rdquo; hinzu, über den Platzhalter interaktiv eingefügt werden können.</li></ul><strong>Schnellstart:</strong> Bilder oder eine PDF über den Joomla-Medienmanager nach <code>images/stpageflip/ihr-buch/</code> hochladen. Den Editor-Button verwenden oder manuell <code>[book img=&quot;ihr-buch&quot;]</code> eingeben. Im Tab &ldquo;PDF-Bücher verwalten&rdquo; können PDFs in Seitenbilder konvertiert werden."
