PLG_CONTENT_STPAGEFLIP="Content - ST PageFlip"
PLG_CONTENT_STPAGEFLIP_XML_DESCRIPTION="<strong>ST PageFlip</strong> – Interactive page-turning flipbooks for Joomla articles.<br><br><strong>This package contains three plugins:</strong><ul><li><strong>Content – ST PageFlip</strong> (this plugin): Renders <code>[book img=&quot;folder-name&quot;]</code> shortcodes in articles as interactive flipbooks.</li><li><strong>AJAX – ST PageFlip</strong>: Backend service for scanning book folders and converting PDFs to page images (Imagick required).</li><li><strong>Button – ST PageFlip</strong>: Adds a &ldquo;PageFlip Book&rdquo; button to the article editor toolbar for interactive shortcode insertion.</li></ul><strong>Quick start:</strong> Upload images or a PDF to <code>images/stpageflip/your-book/</code> via the Joomla Media Manager. Use the editor button to insert a shortcode, or type <code>[book img=&quot;your-book&quot;]</code> manually. Use the &ldquo;Manage PDF books&rdquo; tab to convert PDFs to page images."
